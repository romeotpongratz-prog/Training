<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Training" />
<title>Training</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
:root {
  --bg:#0A0C10; --surface:#12151C; --surface-2:#1A1E27; --border:#232834;
  --accent:#3B82F6; --accent-soft:#7DA9F0;
  --text:#EAEEF5; --text-dim:#6B7280; --text-faint:#424955;
  --nav-h:88px;
}
* { box-sizing:border-box; -webkit-tap-highlight-color:transparent; margin:0; padding:0; }
html,body { background:var(--bg); min-height:100vh; }
body { font-family:'Inter',sans-serif; color:var(--text); padding-top:env(safe-area-inset-top); }
button { font-family:inherit; cursor:pointer; color:inherit; }
input::-webkit-outer-spin-button,input::-webkit-inner-spin-button { -webkit-appearance:none; }
input[type=number] { -moz-appearance:textfield; }
.ab { font-family:'Archivo Black',sans-serif; }
svg { display:block; }
.bottom-spacer { height:var(--nav-h); }

/* NAV */
.bottom-nav { position:fixed; bottom:0; left:0; right:0; background:var(--surface); border-top:1px solid var(--border); display:flex; padding:10px 0 calc(12px + env(safe-area-inset-bottom)); z-index:40; }
.nav-btn { flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; background:none; border:none; color:var(--text-faint); font-size:10px; font-weight:700; letter-spacing:0.5px; padding:2px 0; transition:color 0.15s; }
.nav-btn.active { color:var(--text); }
.nav-btn.active .nav-ic path { stroke:var(--accent); }

/* HOME */
.home-header { padding:26px 20px 6px; display:flex; justify-content:center; }
.brand-lockup { display:flex; align-items:center; gap:12px; }
.brand-word { font-size:30px; letter-spacing:-0.5px; }

/* RANK CARD */
.rank-card { margin:16px 20px 0; border-radius:20px; padding:22px; position:relative; overflow:hidden; background:var(--surface); border:1px solid var(--border); }
.rank-top { display:flex; align-items:center; gap:14px; position:relative; }
.rank-emblem-wrap { width:56px; height:56px; flex-shrink:0; }
.rank-label { font-size:10px; letter-spacing:2.5px; font-weight:700; color:var(--text-dim); }
.rank-name { font-size:26px; letter-spacing:-0.5px; margin-top:2px; }
.rank-pts { font-size:12.5px; color:var(--text-dim); margin-top:3px; }
.rank-bar-track { height:6px; background:var(--surface-2); border-radius:4px; margin-top:18px; overflow:hidden; position:relative; z-index:1; }
.rank-bar-fill { height:100%; border-radius:4px; transition:width 0.5s ease; }
.rank-bar-labels { display:flex; justify-content:space-between; margin-top:7px; font-size:10px; color:var(--text-faint); font-weight:600; position:relative; z-index:1; }
.rank-card-btn { display:block; width:calc(100% - 40px); text-align:left; cursor:pointer; }
.rank-card-arrow { margin-left:auto; align-self:center; opacity:0.7; }

/* RANK DETAIL VIEW */
.rank-next-card { margin:16px 20px 0; background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:24px 20px; display:flex; flex-direction:column; align-items:center; text-align:center; position:relative; overflow:hidden; }
.rank-next-emblems { display:flex; align-items:center; gap:14px; margin-bottom:16px; }
.rank-next-cur { width:48px; height:48px; }
.rank-next-nxt { width:48px; height:48px; }
.rank-next-arrow { opacity:0.5; }
.rank-next-big { font-size:46px; line-height:1; color:var(--accent); }
.rank-next-label { font-size:12px; color:var(--text-dim); font-weight:700; letter-spacing:1px; text-transform:uppercase; margin-top:5px; }
.ch-list { padding:0 20px; display:flex; flex-direction:column; gap:10px; }
.ch-row { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:13px 14px; display:flex; align-items:center; gap:12px; }
.ch-row.done { border-color:rgba(61,214,140,0.35); }
.ch-emblem { width:34px; height:34px; flex-shrink:0; }
.ch-info { flex:1; min-width:0; }
.ch-rank { font-size:11px; font-weight:800; letter-spacing:0.5px; color:var(--text-faint); }
.ch-task { font-size:14px; font-weight:700; margin-top:2px; }
.ch-bar-track { height:5px; background:var(--surface-2); border-radius:3px; margin-top:8px; overflow:hidden; }
.ch-bar-fill { height:100%; border-radius:3px; transition:width 0.5s ease; }
.ch-status { flex-shrink:0; min-width:42px; text-align:right; }
.ch-best { font-size:12px; font-weight:700; color:var(--text-dim); }
.ch-check { display:inline-flex; }

/* STAT CHIPS */
.stat-row { display:flex; gap:10px; padding:14px 20px 0; }
.stat-chip { flex:1; background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:13px 10px; display:flex; flex-direction:column; align-items:center; gap:5px; position:relative; overflow:hidden; }
.stat-chip-ic { height:18px; position:relative; z-index:1; }
.stat-chip-val { font-size:19px; position:relative; z-index:1; }
.stat-chip-label { font-size:9.5px; color:var(--text-dim); letter-spacing:0.5px; text-transform:uppercase; position:relative; z-index:1; }

/* STREAK FLAME CARD */
.streak-card { margin:16px 20px 0; background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:24px 20px 20px; display:flex; flex-direction:column; align-items:center; position:relative; overflow:hidden; }
.streak-card.lit { border-color:rgba(255,138,30,0.4); }
.streak-glow { position:absolute; top:-30px; left:50%; transform:translateX(-50%); width:200px; height:200px; border-radius:50%; background:#FF8A1E; filter:blur(70px); opacity:0.22; pointer-events:none; }
.streak-flame { position:relative; height:64px; }
.streak-card.lit .streak-flame { animation:flameFlicker 2.4s ease-in-out infinite; transform-origin:center bottom; }
@keyframes flameFlicker { 0%,100%{ transform:scale(1) rotate(0deg);} 25%{ transform:scale(1.05,0.97) rotate(-1.5deg);} 50%{ transform:scale(0.97,1.04) rotate(1deg);} 75%{ transform:scale(1.03,0.99) rotate(-0.5deg);} }
@keyframes foilShift { 0%,100%{ background-position:0% 50%; } 50%{ background-position:100% 50%; } }
@keyframes foilSheen { 0%{ background-position:200% 0; } 100%{ background-position:-200% 0; } }
.streak-num { font-size:54px; line-height:1; margin-top:6px; position:relative; }
.streak-unit { font-size:12px; color:var(--text-dim); font-weight:700; letter-spacing:1px; text-transform:uppercase; margin-top:2px; position:relative; }

/* SWIPE DAY PREVIEW */
.swipe-section { padding:20px 0 4px; }
.swipe-viewport { overflow:hidden; padding:0 20px; touch-action:pan-y; }
.swipe-track { display:flex; gap:16px; transition:transform 0.38s cubic-bezier(.22,1,.36,1); will-change:transform; }
.swipe-card { flex:0 0 100%; box-sizing:border-box; background:var(--surface); border:1.5px solid var(--border); border-radius:22px; padding:30px 26px 22px; min-height:188px; display:flex; flex-direction:column; text-align:left; position:relative; overflow:hidden; transition:border-color 0.25s, transform 0.14s cubic-bezier(.34,1.56,.64,1); }
.swipe-card:active { transform:scale(0.975); }
.swipe-card-glow { position:absolute; top:-60px; right:-50px; width:160px; height:160px; border-radius:50%; filter:blur(60px); opacity:0.18; pointer-events:none; }
/* Holographic Foil — iridescent blue shimmer + traveling sheen */
.swipe-foil { position:absolute; inset:0; pointer-events:none; z-index:0; opacity:0.16; border-radius:inherit; background-image:linear-gradient(115deg, #7DA9F0, #3B82F6, #BFD4F7, #2456B8, #56C7E6, #7DA9F0); background-size:300% 300%; animation:foilShift 16s ease infinite; }
.swipe-foil-sheen { position:absolute; inset:0; pointer-events:none; z-index:0; border-radius:inherit; background:linear-gradient(120deg, transparent 30%, rgba(255,255,255,0.18) 50%, transparent 70%); background-size:200% 100%; animation:foilSheen 11s ease infinite; }
/* Reusable foil layers for other cards */
.foil { position:absolute; inset:0; pointer-events:none; z-index:0; opacity:0.12; border-radius:inherit; background-image:linear-gradient(115deg, #7DA9F0, #3B82F6, #BFD4F7, #2456B8, #56C7E6, #7DA9F0); background-size:300% 300%; animation:foilShift 18s ease infinite; }
.foil-sheen { position:absolute; inset:0; pointer-events:none; z-index:0; border-radius:inherit; background:linear-gradient(120deg, transparent 35%, rgba(255,255,255,0.14) 50%, transparent 65%); background-size:200% 100%; animation:foilSheen 13s ease infinite; }
.swipe-day-num { font-size:13px; letter-spacing:2.5px; position:relative; }
.swipe-day-title { font-size:38px; line-height:1.05; margin-top:8px; letter-spacing:-0.5px; position:relative; }
.swipe-day-sub { font-size:14px; color:var(--text-dim); margin-top:8px; position:relative; }
.swipe-card-foot { margin-top:auto; padding-top:20px; display:flex; justify-content:space-between; align-items:flex-end; position:relative; }
.swipe-meta { font-size:12px; color:var(--text-faint); font-weight:600; }
.swipe-progress { font-size:12px; font-weight:700; }
.swipe-tap { font-size:12px; color:var(--text-faint); font-weight:600; letter-spacing:0.3px; }
.swipe-dots { display:flex; justify-content:center; gap:7px; padding:18px 0 4px; }
.swipe-dot { width:7px; height:7px; border-radius:4px; background:var(--border); border:none; padding:0; transition:width 0.3s cubic-bezier(.22,1,.36,1), background 0.3s; }

/* DAY VIEW */
.day-hero { padding:22px 20px 18px; position:relative; }
.back-btn { background:var(--surface); border:1px solid var(--border); border-radius:10px; width:38px; height:38px; display:flex; align-items:center; justify-content:center; margin-bottom:16px; }
.day-hero-label { font-size:11px; letter-spacing:3px; color:var(--text-dim); font-weight:700; }
.day-hero-title { font-size:34px; letter-spacing:-0.5px; margin-top:2px; }
.day-hero-sub { font-size:13px; color:var(--text-dim); margin-top:2px; }
.progress-track { height:5px; background:var(--surface-2); border-radius:4px; margin-top:16px; overflow:hidden; }
.progress-fill { height:100%; border-radius:4px; transition:width 0.3s ease; }
.progress-label { font-size:11px; color:var(--text-dim); margin-top:7px; font-weight:600; }

/* EXERCISE */
.ex-list { padding:8px 16px 0; display:flex; flex-direction:column; gap:12px; }
.ex-card { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:14px 14px 10px; transition:border-color 0.2s; }
.ex-header { display:flex; align-items:flex-start; margin-bottom:11px; }
.ex-name { font-size:15px; font-weight:700; line-height:1.25; flex:1; }
.ex-meta { font-size:11.5px; color:var(--text-dim); margin-top:3px; }
.ex-badge { font-size:11px; font-weight:700; border:1px solid var(--border); border-radius:8px; padding:4px 9px; color:var(--text-faint); white-space:nowrap; }
.set-grid { display:flex; flex-direction:column; gap:8px; }
.set-head { display:grid; grid-template-columns:28px 1fr 1fr 40px; gap:8px; align-items:center; padding:0 2px 2px; }
.set-col-label { font-size:9.5px; color:var(--text-faint); font-weight:700; letter-spacing:0.8px; text-align:center; }
.set-row { display:grid; grid-template-columns:28px 1fr 1fr 40px; gap:8px; align-items:center; }
.set-num { font-size:13px; font-weight:800; text-align:center; color:var(--text-faint); }
.stepper { display:flex; align-items:center; background:var(--surface-2); border:1px solid var(--border); border-radius:11px; overflow:hidden; height:42px; transition:border-color 0.18s; }
.stepper:focus-within { border-color:var(--accent); }
.step-btn { width:34px; height:100%; border:none; background:transparent; color:var(--text-dim); font-size:20px; font-weight:600; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:background 0.12s, color 0.12s, transform 0.1s; }
.step-btn:active { transform:scale(0.85); color:var(--text); }
.step-input { flex:1; min-width:0; background:transparent; border:none; color:var(--text); font-size:16px; font-weight:700; text-align:center; padding:0; width:100%; -moz-appearance:textfield; }
.step-input::-webkit-outer-spin-button,.step-input::-webkit-inner-spin-button { -webkit-appearance:none; margin:0; }
.step-input:focus { outline:none; }
.step-input::placeholder { color:var(--text-faint); font-weight:600; }
.check-btn { width:40px; height:40px; border-radius:12px; border:1.5px solid var(--border); display:flex; align-items:center; justify-content:center; background:transparent; }

/* FINISH BUTTON */
.finish-btn { margin:22px 16px 0; width:calc(100% - 32px); background:var(--accent); color:#0A0C10; border:none; border-radius:14px; padding:17px; font-size:15px; font-weight:800; display:flex; align-items:center; justify-content:center; gap:9px; letter-spacing:0.3px; }
.finish-btn:active { background:var(--accent-soft); }
.finish-btn.disabled { background:var(--surface-2); color:var(--text-faint); }

/* TIMER */
.timer-overlay,.modal-overlay { position:fixed; inset:0; background:rgba(5,7,10,0.9); backdrop-filter:blur(8px); display:flex; align-items:center; justify-content:center; z-index:60; padding:20px; }
.timer-card { background:var(--surface); border:1px solid var(--border); border-radius:24px; padding:32px 28px; display:flex; flex-direction:column; align-items:center; position:relative; width:min(320px,88vw); }
.timer-close { position:absolute; top:14px; right:14px; background:none; border:none; }
.timer-ring-outer { width:176px; height:176px; border-radius:50%; display:flex; align-items:center; justify-content:center; padding:8px; }
.timer-ring-inner { width:100%; height:100%; border-radius:50%; background:var(--bg); display:flex; flex-direction:column; align-items:center; justify-content:center; }
.timer-time { font-size:44px; font-weight:800; letter-spacing:-1px; }
.timer-sub { font-size:11px; color:var(--text-dim); margin-top:4px; letter-spacing:2px; }
.timer-controls { display:flex; gap:10px; margin-top:26px; }
.timer-btn { background:var(--surface-2); border:1px solid var(--border); border-radius:12px; padding:11px 16px; font-size:13px; font-weight:700; min-width:54px; display:flex; align-items:center; justify-content:center; }
.timer-reset-btn { margin-top:14px; background:none; border:none; color:var(--text-faint); font-size:11.5px; font-weight:600; display:flex; align-items:center; gap:5px; }

/* FINISH MODAL */
.modal-sheet { background:var(--surface); border:1px solid var(--border); border-radius:24px; padding:30px 26px; display:flex; flex-direction:column; align-items:center; width:min(340px,90vw); text-align:center; }
.modal-emblem { width:64px; height:64px; margin-bottom:6px; }
.modal-eyebrow { font-size:11px; letter-spacing:3px; font-weight:700; color:var(--text-dim); margin-top:4px; }
.modal-title { font-size:20px; font-weight:800; margin-top:8px; }
.modal-title-lg { font-size:28px; letter-spacing:-0.5px; margin-top:2px; }
.modal-text { font-size:13px; color:var(--text-dim); line-height:1.6; margin-top:12px; }
.modal-points { font-size:40px; letter-spacing:-1px; color:var(--accent-soft); margin-top:14px; }
.modal-points span { font-size:16px; color:var(--text-dim); font-weight:700; }
.rank-up-badge { margin-top:14px; background:linear-gradient(90deg,var(--accent),var(--accent-soft)); color:#0A0C10; font-size:12px; font-weight:800; letter-spacing:0.5px; padding:8px 16px; border-radius:20px; }
.modal-total { font-size:12px; color:var(--text-dim); margin-top:14px; font-weight:600; }
.modal-actions { display:flex; gap:10px; margin-top:24px; width:100%; }
.modal-btn-ghost { flex:1; background:var(--surface-2); border:1px solid var(--border); border-radius:13px; padding:14px; font-size:14px; font-weight:700; }
.modal-btn-primary { flex:1; background:var(--accent); color:#0A0C10; border:none; border-radius:13px; padding:14px; font-size:14px; font-weight:800; }
.modal-btn-primary.full { width:100%; margin-top:24px; }

/* STATS */
.stats-header { padding:28px 20px 18px; }
.stats-kicker { font-size:11px; letter-spacing:3px; color:var(--text-faint); font-weight:700; margin-bottom:3px; }
.stats-title { font-size:32px; letter-spacing:-0.5px; }
.section-label { font-size:11px; letter-spacing:2.5px; color:var(--text-faint); font-weight:700; padding:0 20px; margin-bottom:11px; }
.ranks-grid { padding:0 20px; display:flex; flex-direction:column; gap:8px; margin-bottom:26px; }
.rank-row { display:flex; align-items:center; gap:13px; background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:11px 14px; }
.rank-row-emblem { width:30px; height:30px; flex-shrink:0; }
.rank-row-info { flex:1; }
.rank-row-name { font-size:14px; font-weight:700; }
.rank-row-pts { font-size:11px; color:var(--text-dim); margin-top:1px; }
.rank-row-status { font-size:10px; font-weight:700; letter-spacing:0.5px; }
.pr-list { padding:0 20px; display:flex; flex-direction:column; gap:8px; margin-bottom:26px; }
.pr-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:13px 14px; }
.pr-card-header { display:flex; justify-content:space-between; align-items:flex-start; }
.pr-card-name { font-size:13px; font-weight:700; }
.pr-card-pts { font-size:10px; color:var(--text-dim); font-weight:600; margin-top:2px; }
.pr-card-weight { font-size:16px; font-weight:800; color:var(--accent-soft); }
.mini-chart { width:100%; display:flex; align-items:flex-end; gap:4px; margin-top:10px; }
.mini-bar-col { flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; }
.mini-bar { width:100%; border-radius:3px 3px 0 0; min-height:4px; background:var(--accent); opacity:0.55; }
.mini-bar-label { font-size:8px; color:var(--text-faint); font-weight:600; }
.hist-list { padding:0 20px; display:flex; flex-direction:column; gap:8px; }
.hist-row { display:flex; align-items:center; gap:11px; background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:11px 12px; }
.hist-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
.hist-info { flex:1; }
.hist-day { font-size:12.5px; font-weight:700; }
.hist-date { font-size:11px; color:var(--text-dim); margin-top:1px; }
.hist-pts { font-size:12px; font-weight:800; color:var(--accent-soft); }
.empty-state { text-align:center; padding:30px 20px; color:var(--text-faint); font-size:13px; line-height:1.6; }
.stat-empty { margin:16px 20px 0; background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:26px 22px; text-align:center; color:var(--text-dim); font-size:13.5px; line-height:1.6; }
/* PR detail rows */
.pr-row { display:flex; align-items:center; justify-content:space-between; gap:12px; background:var(--surface); border:1px solid var(--border); border-radius:13px; padding:14px 16px; }
.pr-main { min-width:0; }
.pr-name { font-size:14.5px; font-weight:700; }
.pr-reps { font-size:11.5px; color:var(--text-faint); font-weight:600; margin-top:2px; }
.pr-weight { font-size:24px; color:var(--accent-soft); white-space:nowrap; }
.pr-kg { font-size:13px; font-weight:700; margin-left:2px; color:var(--text-dim); }
/* mini stat summary */
.mini-stat-row { display:flex; gap:10px; padding:16px 20px 0; }
.mini-stat { flex:1; background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:16px 12px; text-align:center; }
.mini-stat-val { font-size:26px; line-height:1; }
.mini-stat-lbl { font-size:10.5px; color:var(--text-dim); letter-spacing:0.5px; text-transform:uppercase; font-weight:600; margin-top:6px; }
/* horizontal set bars */
.setbar-list { padding:0 20px; display:flex; flex-direction:column; gap:11px; }
.setbar-row { display:flex; align-items:center; gap:12px; }
.setbar-label { font-size:12.5px; font-weight:600; width:84px; flex-shrink:0; color:var(--text-dim); }
.setbar-track { flex:1; height:10px; background:var(--surface-2); border-radius:5px; overflow:hidden; }
.setbar-fill { height:100%; border-radius:5px; min-width:2px; transition:width 0.5s cubic-bezier(.22,1,.36,1); }
.setbar-val { font-size:12.5px; font-weight:800; width:34px; text-align:right; flex-shrink:0; }

/* BODY VIEW */
.body-stat-row { display:flex; gap:10px; padding:16px 20px 0; }
.body-stat { flex:1; background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:16px 8px; text-align:center; }
.body-stat-val { font-size:24px; line-height:1; }
.body-stat-unit { font-size:12px; font-weight:700; color:var(--text-dim); margin-left:2px; }
.body-stat-lbl { font-size:10px; color:var(--text-dim); letter-spacing:0.5px; text-transform:uppercase; font-weight:600; margin-top:7px; }
.body-bmi { text-align:center; font-size:12.5px; color:var(--text-dim); margin-top:12px; }
.body-bmi strong { color:var(--text); }
.body-form { padding:0 20px; display:flex; flex-direction:column; gap:10px; }
.body-input-row { display:flex; align-items:center; gap:12px; }
.body-input-lbl { font-size:13px; font-weight:600; color:var(--text-dim); width:80px; flex-shrink:0; }
.body-input-wrap { flex:1; display:flex; align-items:center; background:var(--surface-2); border:1px solid var(--border); border-radius:12px; padding:0 14px; height:46px; transition:border-color 0.18s; }
.body-input-wrap:focus-within { border-color:var(--accent); }
.body-input { flex:1; min-width:0; background:transparent; border:none; color:var(--text); font-size:16px; font-weight:700; outline:none; -moz-appearance:textfield; }
.body-input::-webkit-outer-spin-button,.body-input::-webkit-inner-spin-button { -webkit-appearance:none; margin:0; }
.body-input-suf { font-size:13px; color:var(--text-faint); font-weight:700; margin-left:6px; }
.body-save-btn { margin-top:6px; background:var(--accent); color:#fff; border:none; border-radius:13px; padding:14px; font-size:15px; font-weight:700; transition:transform 0.14s cubic-bezier(.34,1.56,.64,1), filter 0.15s; }
.body-save-btn:active { transform:scale(0.97); filter:brightness(0.92); }
/* weight trend mini chart */
.bw-chart { display:flex; align-items:flex-end; gap:8px; padding:0 20px; height:110px; }
.bw-col { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:flex-end; height:100%; gap:5px; }
.bw-bar { width:100%; max-width:30px; background:linear-gradient(180deg,var(--accent),var(--accent-soft)); border-radius:5px 5px 0 0; min-height:8px; }
.bw-lbl { font-size:10px; color:var(--text-faint); font-weight:600; }
/* body history */
.bh-list { padding:0 20px; display:flex; flex-direction:column; gap:8px; }
.bh-row { display:flex; justify-content:space-between; align-items:center; background:var(--surface); border:1px solid var(--border); border-radius:11px; padding:11px 14px; }
.bh-date { font-size:12.5px; color:var(--text-dim); font-weight:600; }
.bh-vals { font-size:13px; font-weight:700; }
/* MUSCLE RANKING podium */
.podium { padding:0 20px; display:flex; flex-direction:column; gap:10px; }
.podium-item { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:14px 16px; display:flex; align-items:center; gap:13px; flex-wrap:wrap; }
.podium-item.first { border-color:rgba(255,210,74,0.4); }
.podium-medal { width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:800; color:#0A0C10; flex-shrink:0; }
.podium-name { font-size:15px; font-weight:700; flex:1; }
.podium-bar-track { width:100%; height:7px; background:var(--surface-2); border-radius:4px; overflow:hidden; order:3; }
.podium-bar-fill { height:100%; border-radius:4px; transition:width 0.6s cubic-bezier(.22,1,.36,1); }
.podium-meta { font-size:11px; color:var(--text-faint); font-weight:600; width:100%; order:4; }
.mr-list { padding:10px 20px 0; display:flex; flex-direction:column; gap:7px; }
.mr-row { display:flex; align-items:center; gap:13px; padding:9px 16px; }
.mr-pos { font-size:13px; font-weight:800; color:var(--text-faint); width:18px; }
.mr-name { font-size:14px; font-weight:600; flex:1; }
.mr-meta { font-size:12px; color:var(--text-dim); font-weight:600; }
.mr-note { padding:12px 20px 0; font-size:11px; color:var(--text-faint); text-align:center; }

/* TOAST */
#toast { position:fixed; bottom:calc(var(--nav-h) + 16px); left:50%; transform:translateX(-50%) translateY(20px); background:var(--surface-2); border:1px solid var(--border); color:var(--text); font-size:13px; font-weight:600; padding:11px 18px; border-radius:12px; opacity:0; pointer-events:none; transition:all 0.25s; z-index:80; white-space:nowrap; }
#toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

/* INTRO / SPLASH */
#intro { position:fixed; inset:0; z-index:100; background:#0A0C10; display:flex; flex-direction:column; align-items:center; justify-content:center; transition:opacity 0.55s ease, visibility 0.55s ease; padding:env(safe-area-inset-top) 24px 0; }
#intro.hide { opacity:0; visibility:hidden; pointer-events:none; }
/* Clean glow behind logo on intro */
.intro-glow { position:absolute; top:50%; left:50%; width:300px; height:300px; transform:translate(-50%,-50%); border-radius:50%; background:radial-gradient(circle at 50% 50%, rgba(59,130,246,0.22), transparent 65%); filter:blur(40px); }

.intro-crest-btn { background:none; border:none; padding:0; position:relative; z-index:2; transition:transform 0.3s cubic-bezier(.34,1.56,.64,1); animation:crestFloat 3s ease-in-out infinite; }
.torus-wrap { width:300px; height:300px; max-width:80vw; max-height:80vw; position:relative; z-index:2; cursor:pointer; touch-action:manipulation; }
.torus-wrap canvas { width:100% !important; height:100% !important; }
.intro-crest-btn:active { transform:scale(0.92); }
@keyframes crestFloat { 0%,100%{ transform:translateY(0);} 50%{ transform:translateY(-8px);} }
.intro-crest-ring { position:absolute; inset:-20px; border:1.5px solid var(--border); border-radius:50%; z-index:-1; animation:ringPulse 3s ease-in-out infinite; }
.intro-touch { margin-top:38px; font-size:13px; letter-spacing:2.5px; color:var(--text-faint); font-weight:600; text-transform:uppercase; animation:touchFade 2.2s ease-in-out infinite; }
@keyframes touchFade { 0%,100%{ opacity:0.35; } 50%{ opacity:0.85; } }
@keyframes ringPulse { 0%,100%{ opacity:0.45; transform:scale(1);} 50%{ opacity:0.12; transform:scale(1.1);} }

/* APP HIDDEN UNTIL ENTER (prevents flash) */
#app { opacity:0; transform:translateY(10px) scale(0.99); transition:opacity 0.55s ease, transform 0.55s cubic-bezier(.22,1,.36,1); }
#app.entered { opacity:1; transform:none; }

/* VIEW + STAGGER ENTRANCE */
@keyframes fadeUp { from{ opacity:0; transform:translateY(12px);} to{ opacity:1; transform:none;} }
.view-anim > * { animation:fadeUp 0.42s cubic-bezier(.22,1,.36,1) both; }
.view-anim > *:nth-child(1){ animation-delay:.03s; }
.view-anim > *:nth-child(2){ animation-delay:.09s; }
.view-anim > *:nth-child(3){ animation-delay:.15s; }
.view-anim > *:nth-child(4){ animation-delay:.21s; }
.view-anim > *:nth-child(5){ animation-delay:.27s; }
.view-anim > *:nth-child(6){ animation-delay:.33s; }

/* BUTTON MICRO-INTERACTIONS */
.nav-btn, .finish-btn, .back-btn,
.timer-btn, .modal-btn-primary, .modal-btn-ghost, .stat-chip, .rank-card-btn {
  transition: transform .14s cubic-bezier(.34,1.56,.64,1), background .15s ease, border-color .15s ease;
}
.finish-btn:active, .back-btn:active,
.timer-btn:active, .modal-btn-primary:active, .modal-btn-ghost:active, .stat-chip:active, .rank-card-btn:active { transform:scale(0.98); }
.nav-btn:active { transform:scale(0.9); }
.check-btn { transition:transform .14s cubic-bezier(.34,1.56,.64,1), background .15s ease, border-color .15s ease; }
.check-btn:active { transform:scale(0.86); }
@keyframes popIcon { 0%{ transform:scale(0.3);} 55%{ transform:scale(1.25);} 100%{ transform:scale(1);} }
.check-btn.pop svg { animation:popIcon .3s cubic-bezier(.34,1.56,.64,1); }

@media (prefers-reduced-motion: reduce){
  .intro-crest-btn,.intro-crest-ring,.intro-touch { animation:none; }
  .view-anim > *, #app, .check-btn.pop svg, .streak-card.lit .streak-flame { animation:none; transition:none; }
  .swipe-foil, .swipe-foil-sheen, .foil, .foil-sheen { animation:none; }
  #app { opacity:1; transform:none; }
}
</style>
</head>
<body>
<div id="intro">
  <div class="intro-glow"></div>
  <div id="torus-wrap" class="torus-wrap" onclick="torusEnter()"></div>
  <div class="intro-touch">Touch to continue</div>
</div>
<div id="app"></div>
<div id="timer-root"></div>
<div id="modal-root"></div>

<script>
// ============================================================
// DATA
// ============================================================
const PROGRAM = [
  { id:"push", day:1, title:"Push", subtitle:"Chest · Shoulders · Triceps",
    exercises:[
      {name:"Barbell Bench Press", sets:4, reps:"6–8"},
      {name:"Incline DB Press", sets:3, reps:"8–10"},
      {name:"Chest Press Machine", sets:3, reps:"10–12"},
      {name:"Shoulder Press Machine", sets:4, reps:"8–10"},
      {name:"Cable Lateral Raise", sets:4, reps:"12–15"},
      {name:"Tricep Pushdown Cable", sets:3, reps:"10–12"},
      {name:"Overhead Tricep Cable", sets:3, reps:"12–15"},
    ]},
  { id:"pull", day:2, title:"Pull", subtitle:"Back · Biceps",
    exercises:[
      {name:"Pull-Ups / Lat Pulldown", sets:4, reps:"6–10"},
      {name:"Row Machine", sets:4, reps:"8–12"},
      {name:"T-Bar Row", sets:3, reps:"8–10"},
      {name:"Close Grip Lat Pulldown", sets:3, reps:"10–12"},
      {name:"Face Pulls", sets:3, reps:"12–15"},
      {name:"Bicep Curl Machine", sets:3, reps:"10–12"},
      {name:"Hammer Curls", sets:3, reps:"10–12"},
    ]},
  { id:"legs", day:3, title:"Legs", subtitle:"Strong Foundation",
    exercises:[
      {name:"Squats", sets:4, reps:"6–8"},
      {name:"Leg Press", sets:4, reps:"10–12"},
      {name:"Romanian Deadlift", sets:3, reps:"8–10"},
      {name:"Leg Curl Machine", sets:3, reps:"10–12"},
      {name:"Leg Extension", sets:3, reps:"12–15"},
      {name:"Calf Raise Machine", sets:4, reps:"12–20"},
      {name:"Hanging Leg Raises", sets:3, reps:"15"},
    ]},
  { id:"toji", day:4, title:"Special", subtitle:"Shoulders & Arms",
    exercises:[
      {name:"Shoulder Press", sets:4, reps:"8–10"},
      {name:"Lateral Raise Machine", sets:4, reps:"15"},
      {name:"Cable Lateral Raise", sets:3, reps:"15"},
      {name:"Reverse Fly Machine", sets:4, reps:"12–15"},
      {name:"EZ-Bar Curls", sets:4, reps:"8–10"},
      {name:"Hammer Curls", sets:3, reps:"10–12"},
      {name:"Tricep Pushdown", sets:4, reps:"10–12"},
      {name:"Dips", sets:3, reps:"near failure"},
    ]},
  { id:"upper", day:5, title:"Upper Body", subtitle:"Focus Session",
    exercises:[
      {name:"Incline Bench Press", sets:4, reps:"8"},
      {name:"Pull-Ups", sets:4, reps:"max"},
      {name:"Row Machine", sets:3, reps:"10"},
      {name:"Chest Press", sets:3, reps:"12"},
      {name:"Lateral Raise", sets:3, reps:"15"},
      {name:"Face Pulls", sets:3, reps:"15"},
      {name:"Cable Crunches", sets:3, reps:"15"},
    ]},
];

const DAY_HEX = { push:"#3B82F6", pull:"#7DA9F0", legs:"#3B82F6", toji:"#7DA9F0", upper:"#3B82F6" };

// Muscle group mapping: each exercise -> muscle group
const MUSCLE_GROUPS = [
  { id:"chest",     name:"Chest",     hex:"#3B82F6" },
  { id:"back",      name:"Back",      hex:"#7DA9F0" },
  { id:"legs",      name:"Legs",      hex:"#3B82F6" },
  { id:"shoulders", name:"Shoulders", hex:"#7DA9F0" },
  { id:"arms",      name:"Arms",      hex:"#3B82F6" },
];
const EX_MUSCLE = {
  "Barbell Bench Press":"chest","Incline DB Press":"chest","Chest Press Machine":"chest",
  "Chest Press":"chest","Incline Bench Press":"chest","Dips":"chest",
  "Pull-Ups / Lat Pulldown":"back","Row Machine":"back","T-Bar Row":"back",
  "Close Grip Lat Pulldown":"back","Face Pulls":"back","Pull-Ups":"back","Reverse Fly Machine":"back",
  "Squats":"legs","Leg Press":"legs","Romanian Deadlift":"legs","Leg Curl Machine":"legs",
  "Leg Extension":"legs","Calf Raise Machine":"legs","Hanging Leg Raises":"legs","Cable Crunches":"legs",
  "Shoulder Press Machine":"shoulders","Shoulder Press":"shoulders","Lateral Raise Machine":"shoulders",
  "Cable Lateral Raise":"shoulders","Lateral Raise":"shoulders",
  "Tricep Pushdown Cable":"arms","Overhead Tricep Cable":"arms","Bicep Curl Machine":"arms",
  "Hammer Curls":"arms","EZ-Bar Curls":"arms","Tricep Pushdown":"arms",
};

const RANKS = [
  { name:"Bronze",      tier:1, min:0,     max:499,   desc:"0 – 499 pts",        challenge:{ ex:"Barbell Bench Press", kg:40 },  body:{ metric:"logs", target:1,  label:"Log your body stats once" } },
  { name:"Silver",      tier:2, min:500,   max:1499,  desc:"500 – 1,499 pts",    challenge:{ ex:"Barbell Bench Press", kg:60 },  body:{ metric:"logs", target:3,  label:"Log body stats 3 times" } },
  { name:"Gold",        tier:3, min:1500,  max:3499,  desc:"1,500 – 3,499 pts",  challenge:{ ex:"Squats", kg:80 },               body:{ metric:"logs", target:6,  label:"Log body stats 6 times" } },
  { name:"Platinum",    tier:4, min:3500,  max:6999,  desc:"3,500 – 6,999 pts",  challenge:{ ex:"Squats", kg:100 },              body:{ metric:"bodyfat", target:18, label:"Reach 18% body fat or lower" } },
  { name:"Diamond",     tier:5, min:7000,  max:12999, desc:"7,000 – 12,999 pts", challenge:{ ex:"Romanian Deadlift", kg:120 },    body:{ metric:"bodyfat", target:15, label:"Reach 15% body fat or lower" } },
  { name:"Master",      tier:6, min:13000, max:24999, desc:"13,000 – 24,999 pts",challenge:{ ex:"Squats", kg:140 },              body:{ metric:"bodyfat", target:12, label:"Reach 12% body fat or lower" } },
  { name:"Grandmaster", tier:7, min:25000, max:Infinity, desc:"25,000+ pts",     challenge:{ ex:"Romanian Deadlift", kg:160 },    body:{ metric:"bodyfat", target:10, label:"Reach 10% body fat or lower" } },
];

function rankEmblem(tier, size, active) {
  const stroke = active ? "#7DA9F0" : "#2E3440";
  const fill = active ? "#3B82F6" : "#161A22";
  const pipColor = active ? '#EAEEF5' : '#3A414E';
  const crownColor = active ? '#FFD24A' : '#3A414E';

  const hasCrown = tier >= 6;
  // chevron pips: 1..3 based on tier (tiers 1-3 add pips; 4-7 keep 3)
  const n = Math.min(tier, 3);

  // Vertical layout INSIDE the shield. Shield inner area roughly y:6..17, x:7..17
  const crown = hasCrown
    ? `<path d="M9 6.3 L10.6 7.7 L12 5.6 L13.4 7.7 L15 6.3 L14.3 9.2 L9.7 9.2 Z" fill="${crownColor}" stroke="${active?'#E0B83A':'#333a46'}" stroke-width="0.4" stroke-linejoin="round"/>`
    : "";

  // start chevrons lower if crown present, keep them centered and narrow
  const startY = hasCrown ? 10.4 : 8.4;
  const gap = hasCrown ? 2.5 : 3.1;
  let chevrons = "";
  for (let i = 0; i < n; i++) {
    const y = startY + i * gap;
    chevrons += `<path d="M8.8 ${y+2.2} L12 ${y} L15.2 ${y+2.2}" fill="none" stroke="${pipColor}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>`;
  }

  return `<svg width="${size}" height="${size}" viewBox="0 0 24 24">
    <path d="M12 2 L20 5.2 V11 C20 16 16.4 19.6 12 21.6 C7.6 19.6 4 16 4 11 V5.2 Z" fill="${fill}" stroke="${stroke}" stroke-width="1.3" stroke-linejoin="round"/>
    ${crown}${chevrons}
  </svg>`;
}

function pointsForSet(weight, repsStr, repTarget) {
  const w = parseFloat(weight);
  if (isNaN(w)||w<=0) return 0;
  let reps = parseInt(repsStr);
  if (isNaN(reps)||reps<=0) reps = parseInt(repTarget.split(/[–-]/)[0]) || 8;
  return Math.round(w*reps);
}
function getRank(pts){ for(let i=RANKS.length-1;i>=0;i--) if(pts>=RANKS[i].min) return i; return 0; }

// ============================================================
// STORAGE  —  { drafts:{dayId:{exercises:{}}}, log:[ {id,dayId,date,exercises,points} ] }
// ============================================================
const STORAGE_KEY = "toji-tracker-v4";
function load() {
  try { const d=JSON.parse(localStorage.getItem(STORAGE_KEY)); if(d&&d.drafts&&d.log){ if(!d.body) d.body={log:[]}; return d; } } catch {}
  return { drafts:{}, log:[], body:{log:[]} };
}
function save(d){ try { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); } catch {} }
function todayKey(){ return new Date().toISOString().slice(0,10); }
function fmtDate(d){ return new Date(d).toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"}); }

let store = load();
let currentView = "home";
let currentDayId = null;
let timerState = { open:false, hex:"#3B82F6", secs:90, total:90, running:false, iv:null };
let pendingFinish = null;
let lastToggled = null;
let swipeIndex = 0;

function persist(){ save(store); }

// DRAFT helpers
function getDraft(dayId){ if(!store.drafts[dayId]) store.drafts[dayId]={exercises:{}}; return store.drafts[dayId]; }
function ensureEx(dayId, exName, setCount){
  const d=getDraft(dayId);
  if(!d.exercises[exName]) d.exercises[exName]={sets:Array.from({length:setCount},()=>({weight:"",reps:"",done:false}))};
  return d.exercises[exName];
}
function draftDoneSets(dayId){
  const d=store.drafts[dayId]; if(!d) return 0;
  return Object.values(d.exercises||{}).reduce((a,ed)=>a+ed.sets.filter(s=>s.done).length,0);
}

// POINTS
function exPoints(day, exercisesData){
  let pts=0;
  Object.entries(exercisesData||{}).forEach(([n,ed])=>{
    const ex=day.exercises.find(e=>e.name===n); if(!ex) return;
    ed.sets.forEach(s=>{ if(s.done) pts+=pointsForSet(s.weight,s.reps,ex.reps); });
  });
  return pts;
}
function draftPoints(dayId){ const day=PROGRAM.find(d=>d.id===dayId); return exPoints(day, store.drafts[dayId]?.exercises); }
function totalPoints(){ return store.log.reduce((a,e)=>a+(e.points||0),0); }

// FROM LOG: PRs, streak, totals
function computePRs(){
  const prs={};
  [...store.log].sort((a,b)=>a.date<b.date?-1:1).forEach(entry=>{
    const day=PROGRAM.find(d=>d.id===entry.dayId); if(!day) return;
    Object.entries(entry.exercises||{}).forEach(([n,ed])=>{
      const ex=day.exercises.find(e=>e.name===n); if(!ex) return;
      ed.sets.forEach(s=>{
        const w=parseFloat(s.weight);
        if(s.done&&!isNaN(w)&&w>0){
          if(!prs[n]) prs[n]={weight:0,history:[],reps:ex.reps};
          if(w>prs[n].weight) prs[n].weight=w;
          prs[n].history.push({date:entry.date.slice(0,10),weight:w});
        }
      });
    });
  });
  return prs;
}
function computeStreak(){
  const dates=new Set(store.log.map(e=>e.date.slice(0,10)));
  const c=new Date(); let s=0;
  for(let i=0;i<365;i++){
    const k=c.toISOString().slice(0,10);
    if(dates.has(k)){s++;c.setDate(c.getDate()-1);}
    else if(k===todayKey()){c.setDate(c.getDate()-1);}
    else break;
  }
  return s;
}
function completedToday(){
  return store.log.some(e=>e.date.slice(0,10)===todayKey());
}
function computeTotalSets(){
  let n=0;
  store.log.forEach(e=>Object.values(e.exercises||{}).forEach(ed=>{n+=ed.sets.filter(s=>s.done).length;}));
  return n;
}

// BODY: latest entry + helpers
function latestBody(){
  const l=store.body?.log||[];
  return l.length ? l[l.length-1] : null;
}
function latestBodyField(field){
  const l=store.body?.log||[];
  for(let i=l.length-1;i>=0;i--){ if(l[i][field]!=null && l[i][field]!=="") return parseFloat(l[i][field]); }
  return null;
}
function bodyLogCount(){ return (store.body?.log||[]).length; }

// MUSCLE RANKING: combine strength (volume) + progress (improvement)
function computeMuscleRanking(){
  // accumulate per-muscle: total volume, first & best top-set per exercise for progress
  const vol={}, exBest={}, exFirst={};
  [...store.log].sort((a,b)=>a.date<b.date?-1:1).forEach(entry=>{
    Object.entries(entry.exercises||{}).forEach(([n,ed])=>{
      const m=EX_MUSCLE[n]; if(!m) return;
      ed.sets.forEach(s=>{
        const w=parseFloat(s.weight)||0, r=parseInt(s.reps)||0;
        if(s.done&&w>0){
          vol[m]=(vol[m]||0)+w*r;
          if(exFirst[n]==null) exFirst[n]=w;
          if(exBest[n]==null||w>exBest[n]) exBest[n]=w;
        }
      });
    });
  });
  // progress per muscle = sum of (best-first) across its exercises
  const prog={};
  Object.keys(exBest).forEach(n=>{
    const m=EX_MUSCLE[n]; if(!m) return;
    prog[m]=(prog[m]||0)+Math.max(0,(exBest[n]-(exFirst[n]||0)));
  });
  // normalize each component 0..1 across muscles, then score = 0.6*strength + 0.4*progress
  const maxVol=Math.max(...MUSCLE_GROUPS.map(g=>vol[g.id]||0),1);
  const maxProg=Math.max(...MUSCLE_GROUPS.map(g=>prog[g.id]||0),1);
  const ranked=MUSCLE_GROUPS.map(g=>{
    const v=vol[g.id]||0, p=prog[g.id]||0;
    const score=(v/maxVol)*0.6 + (p/maxProg)*0.4;
    return { ...g, volume:Math.round(v), progress:Math.round(p), score, hasData:v>0 };
  }).sort((a,b)=>b.score-a.score);
  return ranked;
}

// ============================================================
// ICONS
// ============================================================
const IC = {
  back:`<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#EAEEF5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>`,
  check:`<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#0A0C10" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>`,
  close:`<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#6B7280" stroke-width="2" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>`,

// ============================================================
function renderHome(){
  const pts=totalPoints();
  const ri=getRank(pts), rank=RANKS[ri], next=RANKS[ri+1];
  const pctBar=next?Math.round(((pts-rank.min)/(next.min-rank.min))*100):100;
  const streak=computeStreak(), totalSets=computeTotalSets(), prCount=Object.keys(computePRs()).length;
  const litToday=completedToday();

  // Swipe day preview cards
  if(swipeIndex<0) swipeIndex=0;
  if(swipeIndex>PROGRAM.length-1) swipeIndex=PROGRAM.length-1;
  const slides=PROGRAM.map(day=>{
    const exData=store.drafts[day.id]?.exercises||{};
    const tot=day.exercises.reduce((a,e)=>a+e.sets,0);
    const doneS=day.exercises.reduce((a,e)=>a+((exData[e.name]?.sets.filter(s=>s.done).length)||0),0);
    const p=tot?Math.round(doneS/tot*100):0;
    const hex=DAY_HEX[day.id];
    const inProgress=draftDoneSets(day.id);
    return `<button class="swipe-card" style="border-color:${p>0?hex:'var(--border)'}" onclick="goDay('${day.id}')">
      <div class="swipe-card-glow" style="background:${hex}"></div>
      <div class="swipe-foil" aria-hidden="true"></div>
      <div class="swipe-foil-sheen" aria-hidden="true"></div>
      <div class="swipe-day-num ab" style="color:${hex}">DAY ${day.day}</div>
      <div class="swipe-day-title ab">${day.title}</div>
      <div class="swipe-day-sub">${day.subtitle}</div>
      <div class="swipe-card-foot">
        <div class="swipe-meta">${day.exercises.length} exercises</div>
        ${inProgress>0?`<div class="swipe-progress" style="color:${hex}">${p}% · ${inProgress} in progress</div>`:`<div class="swipe-tap">Tap to open</div>`}
      </div>
    </button>`;
  }).join("");

  const dots=PROGRAM.map((day,i)=>{
    const hex=DAY_HEX[day.id];
    return `<button class="swipe-dot ${i===swipeIndex?'active':''}" style="${i===swipeIndex?`background:${hex};width:22px`:''}" onclick="goSwipe(${i})" aria-label="Day ${day.day}"></button>`;
  }).join("");

  return `
    <div class="home-header">
      <div class="brand-lockup">
        <span class="brand-word ab">Training</span>
      </div>
    </div>
    <div class="streak-card ${litToday?'lit':'dead'}">
      ${litToday?'<div class="streak-glow"></div>':''}
      <div class="foil"></div><div class="foil-sheen"></div>
      <div class="streak-flame">${litToday?IC.flameLit:IC.flameDead}</div>
      <div class="streak-num ab" style="color:${litToday?'#FF8A1E':'var(--text-faint)'}">${streak}</div>
      <div class="streak-unit">${streak===1?'day streak':'day streak'}</div>
    </div>
    <button class="rank-card rank-card-btn" onclick="goRank()">
      <div class="foil"></div><div class="foil-sheen"></div>
      <div class="rank-top">
        <div class="rank-emblem-wrap">${rankEmblem(rank.tier,56,true)}</div>
        <div>
          <div class="rank-label">CURRENT RANK</div>
          <div class="rank-name ab">${rank.name}</div>
          <div class="rank-pts">${pts.toLocaleString()} pts${next?'':' · MAX'}</div>
        </div>
        <div class="rank-card-arrow">${IC.chevron}</div>
      </div>
      <div class="rank-bar-track"><div class="rank-bar-fill" style="width:${pctBar}%;background:linear-gradient(90deg,var(--accent),var(--accent-soft))"></div></div>
      <div class="rank-bar-labels">

      <button class="stat-chip" onclick="goStat('sets')"><div class="foil"></div><div class="foil-sheen"></div><span class="stat-chip-ic">${IC.sets}</span><span class="stat-chip-val ab">${totalSets}</span><span class="stat-chip-label">Sets</span></button>

// ============================================================
// RENDER: DAY
// ============================================================
function renderDay(dayId){
  const day=PROGRAM.find(d=>d.id===dayId);
  const hex=DAY_HEX[dayId];
  const draft=store.drafts[dayId]||{exercises:{}};
  const total=day.exercises.reduce((a,e)=>a+e.sets,0);
  const done=day.exercises.reduce((a,e)=>a+((draft.exercises[e.name]?.sets.filter(s=>s.done).length)||0),0);
  const pct=total?Math.round(done/total*100):0;

  const exHtml=day.exercises.map(ex=>{
    const exData=draft.exercises[ex.name]||{sets:Array.from({length:ex.sets},()=>({weight:"",reps:"",done:false}))};
    const comp=exData.sets.filter(s=>s.done).length, full=comp===ex.sets;
    const rows=exData.sets.map((s,i)=>{
      const popCls = (lastToggled===dayId+'|'+ex.name+'|'+i) ? ' pop' : '';
      return `
      <div class="set-row">
        <span class="set-num" style="color:${s.done?hex:'var(--text-faint)'}">${i+1}</span>
        <div class="stepper">
          <button class="step-btn" onclick="stepW('${dayId}','${esc(ex.name)}',${ex.sets},${i},-2.5)">−</button>
          <input class="step-input" type="number" inputmode="decimal" placeholder="0" value="${s.weight}" oninput="setW('${dayId}','${esc(ex.name)}',${ex.sets},${i},this.value)"/>
          <button class="step-btn" onclick="stepW('${dayId}','${esc(ex.name)}',${ex.sets},${i},2.5)">+</button>
        </div>
        <div class="stepper">
          <button class="step-btn" onclick="stepR('${dayId}','${esc(ex.name)}',${ex.sets},${i},-1)">−</button>
          <input class="step-input" type="number" inputmode="numeric" placeholder="0" value="${s.reps}" oninput="setR('${dayId}','${esc(ex.name)}',${ex.sets},${i},this.value)"/>
          <button class="step-btn" onclick="stepR('${dayId}','${esc(ex.name)}',${ex.sets},${i},1)">+</button>
        </div>
        <button class="check-btn${popCls}" style="background:${s.done?hex:'transparent'};border-color:${s.done?hex:'var(--border)'}" onclick="toggleSet('${dayId}','${esc(ex.name)}',${ex.sets},${i},'${hex}')">${s.done?IC.check:''}</button>
      </div>`;
    }).join("");
    return `<div class="ex-card" style="border-color:${full?hex:'var(--border)'}">
      <div class="ex-header">
        <div class="ex-name">${ex.name}<div class="ex-meta">${ex.sets} sets × ${ex.reps} reps</div></div>
        <div class="ex-badge" style="border-color:${full?hex:'var(--border)'};color:${full?hex:'var(--text-faint)'}">${comp}/${ex.sets}</div>
      </div>
      <div class="set-grid">
        <div class="set-head"><span class="set-col-label">SET</span><span class="set-col-label">KG</span><span class="set-col-label">REPS</span><span class="set-col-label">✓</span></div>
        ${rows}
      </div>
    </div>`;
  }).join("");

  const pts=draftPoints(dayId);
  const canFinish=done>0;
  const finishBtn=`<button class="finish-btn ${canFinish?'':'disabled'}" onclick="${canFinish?`openFinishConfirm('${dayId}')`:`toast('Mark at least one set as done first')`}">${IC.flag} Finish Day${pts>0?` · +${pts.toLocaleString()} pts`:''}</button>`;

  return `
    <div class="day-hero">
      <button class="back-btn" onclick="goHome()">${IC.back}</button>
      <div class="day-hero-label">DAY ${day.day}</div>
      <div class="day-hero-title ab" style="color:${hex}">${day.title}</div>
      <div class="day-hero-sub">${day.subtitle}</div>
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%;background:${hex}"></div></div>
      <div class="progress-label">${done}/${total} sets · ${pct}%${pts>0?` · +${pts.toLocaleString()} pts pending`:''}</div>
    </div>
    <div class="ex-list">${exHtml}</div>
    ${finishBtn}
    <div class="bottom-spacer"></div>`;
}

// RENDER: STATS

function renderStat(which){
  if(which==="prs") return renderStatPRs();
  if(which==="sets") return renderStatSets();
  return renderStatDays();
}

function statHeader(label,title,sub,color){
  return `
    <div class="day-hero">
      <button class="back-btn" onclick="goHome()">${IC.back}</button>
      <div class="day-hero-label">${label}</div>
      <div class="day-hero-title ab" style="color:${color||'var(--accent)'}">${title}</div>
      <div class="day-hero-sub">${sub}</div>
    </div>`;
}

function emptyState(msg){
  return `<div class="stat-empty">${msg}</div>`;
}

// --- PRs: which exercise, how many kg ---
function renderStatPRs(){
  const prs=computePRs();
  const names=Object.keys(prs);
  // sort by weight desc
  names.sort((a,b)=>prs[b].weight-prs[a].weight);
  const header=statHeader("PERSONAL RECORDS", names.length+" PR"+(names.length===1?"":"s"), "Your best lift per exercise", "var(--accent)");
  if(!names.length) return header+emptyState("No PRs yet. Finish a workout with weights logged to set your first record.")+`<div class="bottom-spacer"></div>`;
  const rows=names.map(n=>{
    const pr=prs[n];
    const best=Math.max(...pr.history.map(h=>h.weight));
    const last=pr.history[pr.history.length-1];
    return `<div class="pr-row">
      <div class="pr-main">
        <div class="pr-name">${n}</div>
        <div class="pr-reps">target ${pr.reps} reps</div>
      </div>
      <div class="pr-weight ab">${best}<span class="pr-kg">kg</span></div>
    </div>`;
  }).join("");
  return header+`<div class="pr-list">${rows}</div><div class="bottom-spacer"></div>`;
}

// --- SETS: total sets, breakdown per day type + per-exercise volume ---
function renderStatSets(){
  const total=computeTotalSets();
  // sets per day-type
  const perDay={};
  let totalReps=0, totalVolume=0;
  store.log.forEach(e=>{
    const day=PROGRAM.find(d=>d.id===e.dayId);
    Object.values(e.exercises||{}).forEach(ed=>{
      ed.sets.forEach(s=>{
        if(s.done){
          perDay[e.dayId]=(perDay[e.dayId]||0)+1;
          const r=parseInt(s.reps)||0, w=parseFloat(s.weight)||0;
          totalReps+=r; totalVolume+=r*w;
        }
      });
    });
  });
  const header=statHeader("TOTAL SETS", total+" set"+(total===1?"":"s"), "Every completed set you've logged", "var(--accent)");
  if(!total) return header+emptyState("No sets completed yet. Check off sets during a workout to track them here.")+`<div class="bottom-spacer"></div>`;
  const summary=`<div class="mini-stat-row">
    <div class="mini-stat"><div class="mini-stat-val ab">${totalReps.toLocaleString()}</div><div class="mini-stat-lbl">Total Reps</div></div>
    <div class="mini-stat"><div class="mini-stat-val ab">${Math.round(totalVolume).toLocaleString()}</div><div class="mini-stat-lbl">Volume (kg)</div></div>
  </div>`;
  const maxV=Math.max(...PROGRAM.map(d=>perDay[d.id]||0),1);
  const bars=PROGRAM.map(d=>{
    const v=perDay[d.id]||0; const hex=DAY_HEX[d.id];
    return `<div class="setbar-row">
      <div class="setbar-label">${d.title}</div>
      <div class="setbar-track"><div class="setbar-fill" style="width:${Math.round(v/maxV*100)}%;background:${hex}"></div></div>
      <div class="setbar-val">${v}</div>
    </div>`;
  }).join("");
  return header+summary+`<div class="section-label">SETS BY DAY</div><div class="setbar-list">${bars}</div><div class="bottom-spacer"></div>`;
}

// --- DAYS DONE: total completed days, breakdown + recent ---
function renderStatDays(){
  const total=store.log.length;
  const perDay={};
  store.log.forEach(e=>{ perDay[e.dayId]=(perDay[e.dayId]||0)+1; });
  const streak=computeStreak();
  const header=statHeader("DAYS COMPLETED", total+" day"+(total===1?"":"s"), "Workouts you've finished", "var(--accent)");
  if(!total) return header+emptyState("No days completed yet. Hit \u201cFinish Day\u201d after a workout to log it here.")+`<div class="bottom-spacer"></div>`;
  const totalPts=totalPoints();
  const summary=`<div class="mini-stat-row">
    <div class="mini-stat"><div class="mini-stat-val ab" style="color:#FF8A1E">${streak}</div><div class="mini-stat-lbl">Day Streak</div></div>
    <div class="mini-stat"><div class="mini-stat-val ab">${totalPts.toLocaleString()}</div><div class="mini-stat-lbl">Total Points</div></div>
  </div>`;
  const maxV=Math.max(...PROGRAM.map(d=>perDay[d.id]||0),1);
  const bars=PROGRAM.map(d=>{
    const v=perDay[d.id]||0; const hex=DAY_HEX[d.id];
    return `<div class="setbar-row">
      <div class="setbar-label">${d.title}</div>
      <div class="setbar-track"><div class="setbar-fill" style="width:${Math.round(v/maxV*100)}%;background:${hex}"></div></div>
      <div class="setbar-val">${v}×</div>
    </div>`;
  }).join("");
  // recent 5
  const recent=[...store.log].sort((a,b)=>a.date<b.date?1:-1).slice(0,5).map(e=>{
    const day=PROGRAM.find(d=>d.id===e.dayId); if(!day) return "";
    return `<div class="hist-row">
      <div class="hist-dot" style="background:${DAY_HEX[e.dayId]}"></div>
      <div class="hist-info"><div class="hist-day" style="color:${DAY_HEX[e.dayId]}">${day.title}</div><div class="hist-date">${fmtDate(e.date)}</div></div>
      <div class="hist-pts">+${(e.points||0).toLocaleString()}</div>
    </div>`;
  }).join("");
  return header+summary+`<div class="section-label">TIMES PER DAY</div><div class="setbar-list">${bars}</div>
    <div class="section-label" style="margin-top:22px">RECENT</div><div class="hist-list">${recent}</div><div class="bottom-spacer"></div>`;
}

}

function saveBody(){

function renderRank(){
  const pts=totalPoints(), ri=getRank(pts);
  const rank=RANKS[ri], next=RANKS[ri+1];
  const prs=computePRs();
  const pctBar=next?Math.round(((pts-rank.min)/(next.min-rank.min))*100):100;
  const needed=next?next.min-pts:0;

  // Build a challenge row for each rank
  const challengeRows=RANKS.map((r,i)=>{
    const ch=r.challenge;
    const best=prs[ch.ex]?prs[ch.ex].weight:0;
    const achieved=best>=ch.kg;
    const isCur=i===ri;
    const pct=Math.min(100,Math.round(best/ch.kg*100));
    return `<div class="ch-row ${achieved?'done':''}" style="${isCur?'border-color:var(--accent)':''}">
      <div class="ch-emblem">${rankEmblem(r.tier,34,pts>=r.min)}</div>
      <div class="ch-info">
        <div class="ch-rank">${r.name}${isCur?' · CURRENT':''}</div>
        <div class="ch-task">${ch.ex} — ${ch.kg} kg</div>
        <div class="ch-bar-track"><div class="ch-bar-fill" style="width:${pct}%;background:${achieved?'#3DD68C':'var(--accent)'}"></div></div>
      </div>
      <div class="ch-status">${achieved?`<span class="ch-check">${IC.check2}</span>`:`<span class="ch-best">${best>0?best+' kg':'—'}</span>`}</div>
    </div>`;
  }).join("");

  // Body challenges
  const bodyLogs=bodyLogCount();
  const curBf=latestBodyField("bodyfat");
  const bodyRows=RANKS.map((r,i)=>{
    const b=r.body; if(!b) return "";
    let achieved=false, progressTxt="—", pct=0;
    if(b.metric==="logs"){
      achieved=bodyLogs>=b.target;
      pct=Math.min(100,Math.round(bodyLogs/b.target*100));
      progressTxt=`${bodyLogs}/${b.target}`;
    } else if(b.metric==="bodyfat"){
      if(curBf!=null){
        achieved=curBf<=b.target;
        // closer to target = more progress; cap display
        pct=achieved?100:Math.max(0,Math.min(100,Math.round((b.target/curBf)*100)));
        progressTxt=`${curBf}%`;
      } else { progressTxt="—"; pct=0; }
    }
    const isCur=i===ri;
    return `<div class="ch-row ${achieved?'done':''}" style="${isCur?'border-color:var(--accent)':''}">
      <div class="ch-emblem">${rankEmblem(r.tier,34,pts>=r.min)}</div>
      <div class="ch-info">
        <div class="ch-rank">${r.name}${isCur?' · CURRENT':''}</div>
        <div class="ch-task">${b.label}</div>
        <div class="ch-bar-track"><div class="ch-bar-fill" style="width:${pct}%;background:${achieved?'#3DD68C':'#FF8A1E'}"></div></div>
      </div>
      <div class="ch-status">${achieved?`<span class="ch-check">${IC.check2}</span>`:`<span class="ch-best">${progressTxt}</span>`}</div>
    </div>`;
  }).join("");

  return `
    <div class="day-hero">
      <button class="back-btn" onclick="goHome()">${IC.back}</button>
      <div class="day-hero-label">YOUR RANK</div>
      <div class="day-hero-title ab" style="color:var(--accent)">${rank.name}</div>
      <div class="day-hero-sub">${pts.toLocaleString()} points total</div>
    </div>

    <div class="rank-next-card">
      <div class="rank-next-emblems">
        <div class="rank-next-cur">${rankEmblem(rank.tier,48,true)}</div>
        <div class="rank-next-arrow">${IC.chevron}</div>
        <div class="rank-next-nxt">${next?rankEmblem(next.tier,48,false):rankEmblem(rank.tier,48,true)}</div>
      </div>
      ${next?`
        <div class="rank-next-big ab">${needed.toLocaleString()}</div>
        <div class="rank-next-label">points to ${next.name}</div>
        <div class="rank-bar-track" style="margin-top:14px"><div class="rank-bar-fill" style="width:${pctBar}%;background:linear-gradient(90deg,var(--accent),var(--accent-soft))"></div></div>
        <div class="rank-bar-labels"><span>${rank.name}</span><span>${next.name}</span></div>
      `:`
        <div class="rank-next-big ab" style="color:var(--accent)">MAX</div>
        <div class="rank-next-label">Highest rank reached</div>
      `}
    </div>

    <div class="section-label">STRENGTH CHALLENGES</div>
    <div class="ch-list">${challengeRows}</div>
    <div class="section-label" style="margin-top:22px">BODY CHALLENGES</div>
    <div class="ch-list">${bodyRows}</div>
    <div class="bottom-spacer"></div>`;
}

function renderStats(){
  const pts=totalPoints(), ri=getRank(pts);
  const prs=computePRs();
  const prEntries=Object.entries(prs).sort((a,b)=>b[1].weight-a[1].weight);

  const ranksHtml=RANKS.map((r,i)=>{
    const isCur=i===ri, unlocked=pts>=r.min;
    return `<div class="rank-row" style="${isCur?'border-color:var(--accent)':''}">
      <div class="rank-row-emblem">${rankEmblem(r.tier,30,unlocked)}</div>
      <div class="rank-row-info">
        <div class="rank-row-name" style="color:${unlocked?'var(--text)':'var(--text-faint)'}">${r.name}</div>
        <div class="rank-row-pts">${r.desc}</div>
      </div>
      <div class="rank-row-status" style="color:${isCur?'var(--accent)':unlocked?'var(--accent-soft)':'var(--text-faint)'}">${isCur?'CURRENT':unlocked?'UNLOCKED':'LOCKED'}</div>
    </div>`;
  }).join("");

  const prHtml=prEntries.length===0
    ? `<div class="empty-state">No records yet.<br>Finish a day to log your lifts.</div>`
    : prEntries.map(([n,d])=>{
        const hist=d.history.slice(-6);
        const maxW=Math.max(...hist.map(h=>h.weight));
        const bars=hist.map(h=>{
          const hPct=maxW>0?(h.weight/maxW):0;
          return `<div class="mini-bar-col"><div class="mini-bar" style="height:${Math.max(4,hPct*38)}px"></div><div class="mini-bar-label">${h.weight}</div></div>`;
        }).join("");
        const exPts=d.history.reduce((a,h)=>a+Math.round(h.weight*(parseInt(d.reps)||8)),0);
        return `<div class="pr-card">
          <div class="pr-card-header">
            <div><div class="pr-card-name">${n}</div><div class="pr-card-pts">+${exPts.toLocaleString()} pts logged</div></div>
            <div class="pr-card-weight">${d.weight} kg</div>
          </div>
          ${hist.length>1?`<div class="mini-chart">${bars}</div>`:''}
        </div>`;
      }).join("");

  const logSorted=[...store.log].sort((a,b)=>a.date<b.date?1:-1).slice(0,20);
  const histHtml=logSorted.length===0
    ? `<div class="empty-state">No sessions yet.<br>Complete a day to see it here.</div>`
    : logSorted.map(entry=>{
        const day=PROGRAM.find(d=>d.id===entry.dayId); if(!day) return "";
        return `<div class="hist-row">
          <div class="hist-dot" style="background:${DAY_HEX[entry.dayId]}"></div>
          <div class="hist-info">
            <div class="hist-day" style="color:${DAY_HEX[entry.dayId]}">${day.title}</div>
            <div class="hist-date">${fmtDate(entry.date)}</div>
          </div>
          <span class="hist-pts">+${(entry.points||0).toLocaleString()}</span>
        </div>`;
      }).join("");

  return `
    <div class="stats-header">
      <div class="stats-kicker">YOUR PROGRESS</div>
      <div class="stats-title ab">Stats</div>
    </div>
    <div class="section-label">RANK SYSTEM</div>
    <div class="ranks-grid">${ranksHtml}</div>
    <div class="section-label">PERSONAL RECORDS</div>
    <div class="pr-list">${prHtml}</div>
    <div class="section-label">HISTORY</div>
    <div class="hist-list">${histHtml}</div>
    <div class="bottom-spacer"></div>`;
}

function openTimer(hex){
  if(timerState.iv) clearInterval(timerState.iv);
  timerState={open:true,hex,secs:90,total:90,running:true,iv:null};
  startTimerLoop(); renderTimerUI();
}
function closeTimer(){ if(timerState.iv) clearInterval(timerState.iv); timerState.open=false; document.getElementById("timer-root").innerHTML=""; }
function startTimerLoop(){
  if(timerState.iv) clearInterval(timerState.iv);
  timerState.iv=setInterval(()=>{
    if(!timerState.running) return;
    if(timerState.secs<=0){clearInterval(timerState.iv);timerState.running=false;if(navigator.vibrate)navigator.vibrate([200,80,200]);renderTimerUI();return;}
    timerState.secs--; renderTimerUI();
  },1000);
}
function timerAdj(d){timerState.secs=Math.max(0,timerState.secs+d);renderTimerUI();}
function timerToggle(){timerState.running=!timerState.running;if(timerState.running)startTimerLoop();renderTimerUI();}
function timerReset(){timerState.secs=90;timerState.running=true;startTimerLoop();renderTimerUI();}
function renderTimerUI(){
  const root=document.getElementById("timer-root");
  if(!root||!timerState.open) return;
  const pct=(timerState.secs/timerState.total)*100;
  const mm=String(Math.floor(timerState.secs/60)).padStart(2,"0");
  const ss=String(timerState.secs%60).padStart(2,"0");
  root.innerHTML=`<div class="timer-overlay">
    <div class="timer-card">
      <button class="timer-close" onclick="closeTimer()">${IC.close}</button>
      <div class="timer-ring-outer" style="background:conic-gradient(${timerState.hex} ${pct}%,var(--surface-2) 0)">
        <div class="timer-ring-inner"><span class="timer-time ab">${mm}:${ss}</span><span class="timer-sub">REST</span></div>
      </div>
      <div class="timer-controls">
        <button class="timer-btn" onclick="timerAdj(-15)">−15s</button>
        <button class="timer-btn" style="background:${timerState.hex};border-color:${timerState.hex}" onclick="timerToggle()">${timerState.running?IC.pause:IC.play}</button>
        <button class="timer-btn" onclick="timerAdj(15)">+15s</button>
      </div>
      <button class="timer-reset-btn" onclick="timerReset()">${IC.reset} reset</button>
    </div>
  </div>`;
}

function toast(msg){

  if(!t){ t=document.createElement('div'); t.id='toast'; document.body.appendChild(t); }

function esc(s){return s.replace(/'/g,"\\'");}
function setW(dayId,exName,setCount,idx,val){ensureEx(dayId,exName,setCount).sets[idx].weight=val;persist();}
function setR(dayId,exName,setCount,idx,val){ensureEx(dayId,exName,setCount).sets[idx].reps=val;persist();}
function stepW(dayId,exName,setCount,idx,delta){
  const ex=ensureEx(dayId,exName,setCount);
  let cur=parseFloat(ex.sets[idx].weight)||0;
  cur=Math.max(0,Math.round((cur+delta)*10)/10);
  ex.sets[idx].weight=String(cur); persist();
  if(navigator.vibrate)navigator.vibrate(6); render();
}
function stepR(dayId,exName,setCount,idx,delta){
  const ex=ensureEx(dayId,exName,setCount);
  let cur=parseInt(ex.sets[idx].reps)||0;
  cur=Math.max(0,cur+delta);
  ex.sets[idx].reps=String(cur); persist();
  if(navigator.vibrate)navigator.vibrate(6); render();
}
function toggleSet(dayId,exName,setCount,idx,hex){
  const ex=ensureEx(dayId,exName,setCount);
  const was=ex.sets[idx].done;
  ex.sets[idx].done=!was; persist();
  if(!was){ lastToggled=dayId+'|'+exName+'|'+idx; if(navigator.vibrate)navigator.vibrate(40); }
  render();
  if(!was)openTimer(hex);
}

  else if(currentView==="day") html=renderDay(currentDayId);
  else if(currentView==="stats") html=renderStats();

function updateSwipe(){
  const track=document.getElementById("swipe-track");
  if(track) track.style.transform=`translateX(calc(-${swipeIndex} * (100% + 16px)))`;
  document.querySelectorAll(".swipe-dot").forEach((d,i)=>{
    const hex=DAY_HEX[PROGRAM[i].id];
    if(i===swipeIndex){ d.classList.add("active"); d.style.background=hex; d.style.width="22px"; }
    else { d.classList.remove("active"); d.style.background=""; d.style.width=""; }
  });
}

function bindSwipe(){
  const vp=document.getElementById("swipe-viewport");
  const track=document.getElementById("swipe-track");
  if(!vp||!track) return;
  let x0=null, y0=null, dx=0, dragging=false, decided=false, horiz=false;
  vp.addEventListener("touchstart",e=>{
    x0=e.touches[0].clientX; y0=e.touches[0].clientY; dx=0; dragging=true; decided=false; horiz=false;
    track.style.transition="none";
  },{passive:true});
  vp.addEventListener("touchmove",e=>{
    if(!dragging) return;
    const cx=e.touches[0].clientX, cy=e.touches[0].clientY;
    dx=cx-x0; const dy=cy-y0;
    if(!decided){ decided=true; horiz=Math.abs(dx)>Math.abs(dy); }
    if(horiz){
      e.preventDefault();
      const step=vp.clientWidth+16;
      let off=-swipeIndex*step+dx;
      // rubber-band at edges
      if((swipeIndex===0&&dx>0)||(swipeIndex===PROGRAM.length-1&&dx<0)) off=-swipeIndex*step+dx*0.32;
      track.style.transform=`translateX(${off}px)`;
    }
  },{passive:false});
  const end=()=>{
    if(!dragging) return; dragging=false;
    track.style.transition="";
    const w=vp.clientWidth;
    if(horiz && Math.abs(dx)>w*0.18){
      if(dx<0 && swipeIndex<PROGRAM.length-1) swipeIndex++;
      else if(dx>0 && swipeIndex>0) swipeIndex--;
      if(navigator.vibrate) navigator.vibrate(8);
    }
    updateSwipe();
  };
  vp.addEventListener("touchend",end,{passive:true});
  vp.addEventListener("touchcancel",end,{passive:true});
}

function initTorus(){
  const el=document.getElementById("torus-wrap");
  if(!el || typeof THREE==="undefined"){
    // Fallback: if three.js missing, keep a simple tap-to-enter
    if(el){ el.style.display="flex"; el.style.alignItems="center"; el.style.justifyContent="center";
      el.innerHTML='<svg width="120" height="120" viewBox="0 0 120 120"><circle cx="60" cy="60" r="44" fill="none" stroke="#3B82F6" stroke-width="3"/><circle cx="60" cy="60" r="22" fill="none" stroke="#7DA9F0" stroke-width="3"/></svg>'; }
    return;
  }
  const reduce=window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  const w=el.clientWidth||300, h=el.clientHeight||300;

  const renderer=new THREE.WebGLRenderer({ antialias:true, alpha:true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
  renderer.setSize(w,h,false);
  el.appendChild(renderer.domElement);

  const scene=new THREE.Scene();
  const camera=new THREE.PerspectiveCamera(45, w/h, 0.1, 100);
  camera.position.z=4.2;

  const group=new THREE.Group(); scene.add(group);

  // solid mesh — in app blue
  const geo=new THREE.TorusKnotGeometry(0.85,0.27,160,20);
  const mat=new THREE.MeshStandardMaterial({ color:0x3B82F6, roughness:0.34, metalness:0.28, transparent:true, opacity:1 });
  const mesh=new THREE.Mesh(geo,mat); group.add(mesh);

  // particle version (one point per vertex)
  const src=geo.attributes.position.array;
  const N=src.length/3;
  const origins=new Float32Array(src);
  const dirs=new Float32Array(src.length);
  for(let i=0;i<N;i++){
    const x=origins[i*3], y=origins[i*3+1], z=origins[i*3+2];
    const len=Math.hypot(x,y,z)||1;
    dirs[i*3]  =x/len+(Math.random()-0.5)*0.5;
    dirs[i*3+1]=y/len+(Math.random()-0.5)*0.5+0.15;
    dirs[i*3+2]=z/len+(Math.random()-0.5)*0.5;
  }
  const ptGeo=new THREE.BufferGeometry();
  const ptPos=new Float32Array(origins);
  ptGeo.setAttribute("position", new THREE.BufferAttribute(ptPos,3));
  // soft sprite
  const sc=document.createElement("canvas"); sc.width=sc.height=64;
  const g2=sc.getContext("2d");
  const grd=g2.createRadialGradient(32,32,0,32,32,32);
  grd.addColorStop(0,"rgba(255,255,255,1)"); grd.addColorStop(0.45,"rgba(255,255,255,.85)"); grd.addColorStop(1,"rgba(255,255,255,0)");
  g2.fillStyle=grd; g2.fillRect(0,0,64,64);
  const sprite=new THREE.CanvasTexture(sc);
  const ptMat=new THREE.PointsMaterial({ size:0.075, map:sprite, color:0x7DA9F0, transparent:true, opacity:0, depthWrite:false, sizeAttenuation:true });
  const points=new THREE.Points(ptGeo,ptMat); group.add(points);

  scene.add(new THREE.AmbientLight(0xffffff,0.6));
  const key=new THREE.DirectionalLight(0xffffff,1.1); key.position.set(3,4,5);
  const rim=new THREE.DirectionalLight(0x7DA9F0,0.8); rim.position.set(-4,-2,1);
  scene.add(key,rim);

  const easeInOutCubic=x=> x<0.5 ? 4*x*x*x : 1-Math.pow(-2*x+2,3)/2;
  const smoothstep=(a,b,x)=>{ const t=Math.min(1,Math.max(0,(x-a)/(b-a))); return t*t*(3-2*t); };
  const SPREAD=1.35;
  let last=performance.now(), raf;

  function apply(){
    const t=torusState.t;
    const e=easeInOutCubic(t);
    if(t>0.0008){
      for(let i=0;i<N;i++){
        ptPos[i*3]  =origins[i*3]  +dirs[i*3]  *SPREAD*e;
        ptPos[i*3+1]=origins[i*3+1]+dirs[i*3+1]*SPREAD*e;
        ptPos[i*3+2]=origins[i*3+2]+dirs[i*3+2]*SPREAD*e;
      }
      ptGeo.attributes.position.needsUpdate=true;
    }
    ptMat.opacity=Math.sin(Math.min(t,1)*Math.PI)*0.9;
    mat.opacity=1-smoothstep(0,0.55,t);
    mesh.visible=mat.opacity>0.001;
    points.visible=ptMat.opacity>0.001;
  }
  function tick(){
    const now=performance.now();
    const dt=Math.min((now-last)/1000,0.05); last=now;
    if(!reduce){ group.rotation.y+=0.006; group.rotation.x+=0.003; }
    const dir=torusState.target-torusState.t;
    if(Math.abs(dir)>0.0001){
      const step=(dt/1.05)*Math.sign(dir);
      torusState.t=Math.abs(step)>=Math.abs(dir)?torusState.target:torusState.t+step;
      apply();
    }
    renderer.render(scene,camera);
    raf=requestAnimationFrame(tick);
  }
  apply(); tick();

  window.addEventListener("resize",()=>{
    const nw=el.clientWidth, nh=el.clientHeight;
    if(!nw||!nh) return;
    renderer.setSize(nw,nh,false);
    camera.aspect=nw/nh; camera.updateProjectionMatrix();
  });
}

// init torus after three.js is ready
if(typeof THREE!=="undefined") initTorus();
else window.addEventListener("load", initTorus);

render();
</script>
</body>
</html>
